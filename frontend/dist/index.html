    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      /* ─── Design Tokens ─────────────────────────────────── */
      :root {
        --color-bg:           #0f172a;
        --color-surface:      #000000;
        --color-surface-hover:#0a0a0a;
        --color-border:       rgba(255,255,255,0.07);
        --color-border-hover: rgba(255,255,255,0.12);
        --color-accent:       #ef4444;
        --color-accent-dim:   rgba(239,68,68,0.1);
        --color-text:         rgba(255,255,255,1);
        --color-text-muted:   rgba(255,255,255,0.65);
        --color-text-faint:   rgba(255,255,255,0.4);
        --color-error:        #f87171;
        --color-error-bg:     rgba(248,113,113,0.06);
        --color-error-border: rgba(248,113,113,0.15);
        --font-display: 'DM Serif Display', serif;
        --font-mono:    'DM Mono', monospace;
        --space-xs:  0.25rem; --space-sm: 0.5rem;
        --space-md:  1rem;    --space-lg: 1.5rem;
        --space-xl:  2rem;    --space-2xl: 3rem;
        --radius-sm: 4px;  --radius-md: 8px;
        --radius-lg: 12px; --radius-xl: 16px;
        --radius-full: 9999px;
        --transition: 0.2s ease;
      }

      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--color-bg);
        font-family: var(--font-mono);
        color: var(--color-text);
        -webkit-font-smoothing: antialiased;
      }

      #root { min-height: 100vh; }

      /* Loading screen shown before React hydrates */
      #initial-load {
        position: fixed; inset: 0; z-index: 9999;
        background: #0f172a;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 1.5rem;
        transition: opacity 0.4s ease;
      }
      #initial-load.hidden { opacity: 0; pointer-events: none; }

      .init-logo {
        width: 64px; height: 64px;
        border-radius: 16px;
        animation: initPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      .init-wordmark {
        font-family: 'DM Serif Display', serif;
        font-size: 2rem;
        color: #fff;
        letter-spacing: -0.01em;
        animation: initFade 0.6s 0.1s ease both;
      }
      .init-wordmark em { color: #ef4444; font-style: italic; }
      .init-dots {
        display: flex; gap: 6px;
        animation: initFade 0.6s 0.2s ease both;
      }
      .init-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: rgba(255,255,255,0.3);
        animation: dotPulse 1.2s ease-in-out infinite;
      }
      .init-dot:nth-child(2) { animation-delay: 0.2s; }
      .init-dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes initPop {
        from { opacity: 0; transform: scale(0.7); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes initFade {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes dotPulse {
        0%,100% { background: rgba(255,255,255,0.2); transform: scale(1); }
        50%      { background: #ef4444; transform: scale(1.3); }
      }

      /* ─── Base classes used by React components ─── */
      .display { font-family: var(--font-display); font-weight:400; letter-spacing:-0.01em; line-height:1.1; }
      .eyebrow { font-size:0.6rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--color-text-muted); }
      .page { min-height:100vh; position:relative; color:var(--color-text); }
      .page-content { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; padding:0 clamp(1.5rem,5vw,4rem); }
      .surface { background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-lg); transition:background var(--transition),border-color var(--transition); }
      .surface:hover { background:var(--color-surface-hover); border-color:var(--color-border-hover); }
      .btn { display:inline-flex; align-items:center; justify-content:center; gap:var(--space-sm); padding:0.75rem var(--space-lg); border-radius:var(--radius-md); font-family:var(--font-mono); font-size:0.85rem; font-weight:500; cursor:pointer; border:none; transition:opacity var(--transition),background var(--transition); }
      .btn:disabled { opacity:0.5; cursor:not-allowed; }
      .btn-primary { background:var(--color-accent); color:#fff; }
      .btn-primary:hover:not(:disabled) { opacity:0.85; }
      .btn-ghost { background:transparent; color:var(--color-text); border:1px solid var(--color-border); }
      .btn-ghost:hover:not(:disabled) { background:var(--color-surface-hover); border-color:var(--color-border-hover); }
      .input { width:100%; padding:0.75rem var(--space-md); background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-md); color:var(--color-text); font-family:var(--font-mono); font-size:0.85rem; outline:none; transition:border-color var(--transition),background var(--transition); }
      .input:focus { border-color:var(--color-accent); background:var(--color-surface-hover); }
      .input::placeholder { color:var(--color-text-faint); }
      select.input { appearance:none; -webkit-appearance:none; cursor:pointer; }
      .alert-error { color:var(--color-error); font-size:0.8rem; padding:0.75rem var(--space-md); background:var(--color-error-bg); border:1px solid var(--color-error-border); border-radius:var(--radius-md); }
      .alert-success { color:#4ade80; font-size:0.8rem; padding:0.75rem var(--space-md); background:rgba(74,222,128,0.06); border:1px solid rgba(74,222,128,0.15); border-radius:var(--radius-md); }
      .skeleton { border-radius:var(--radius-lg); background:rgba(255,255,255,0.04); animation:pulse 1.4s ease-in-out infinite; }
      .divider { display:flex; align-items:center; gap:var(--space-md); color:var(--color-text-faint); font-size:0.7rem; letter-spacing:0.1em; }
      .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--color-border); }
      .empty-state { color:var(--color-text-faint); font-size:0.8rem; padding:2rem 0; text-align:center; }
      .animate-fade-down { animation:fadeDown 0.5s ease both; }
      .animate-slide-up  { animation:slideUp 0.45s ease both; }

      @keyframes fadeDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
      @keyframes slideUp  { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:translateY(0)} }
      @keyframes pulse    { 0%,100%{opacity:0.4} 50%{opacity:0.7} }
      @keyframes fadeIn   { from{opacity:0} to{opacity:1} }

      /* Dashboard */
      .dashboard-header { padding:2.5rem 0 2rem; display:flex; align-items:flex-start; justify-content:space-between; border-bottom:1px solid var(--color-border); }
      .header-greeting { font-family:var(--font-display); font-size:clamp(1.8rem,4vw,2.8rem); font-weight:400; line-height:1.1; letter-spacing:-0.01em; }
      .header-greeting em { font-style:italic; color:var(--color-accent); }
      .header-avatar { width:42px; height:42px; border-radius:var(--radius-full); border:1px solid var(--color-border-hover); object-fit:cover; flex-shrink:0; margin-top:0.25rem; }
      .header-avatar-placeholder { width:42px; height:42px; border-radius:var(--radius-full); border:1px solid var(--color-border-hover); background:var(--color-accent-dim); display:flex; align-items:center; justify-content:center; font-size:0.85rem; color:var(--color-accent); flex-shrink:0; margin-top:0.25rem; }
      .dashboard-main { flex:1; display:flex; flex-direction:column; justify-content:center; padding:var(--space-2xl) 0; max-width:780px; margin:0 auto; width:100%; }
      .accounts-list { display:flex; flex-direction:column; gap:0.75rem; }
      .account-card { opacity:0; animation:slideUp 0.45s ease forwards; cursor:pointer; }
      .card-inner { display:flex; align-items:center; overflow:hidden; transition:background var(--transition),border-color var(--transition),transform var(--transition); }
      .card-inner:hover { transform:translateX(3px); }
      .card-strip { width:3px; align-self:stretch; flex-shrink:0; opacity:0.7; }
      .card-body { flex:1; padding:var(--space-md) 1.25rem; display:flex; flex-direction:column; gap:0.75rem; }
      .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:var(--space-md); }
      .card-institution { font-size:0.6rem; letter-spacing:0.18em; color:var(--color-text-muted); text-transform:uppercase; margin-bottom:0.2rem; }
      .card-name { font-size:0.95rem; font-weight:500; color:var(--color-text); letter-spacing:0.01em; }
      .card-icon { font-size:1.1rem; flex-shrink:0; opacity:0.7; }
      .card-bottom { display:flex; justify-content:space-between; align-items:flex-end; }
      .card-meta { display:flex; align-items:center; gap:0.75rem; }
      .card-subtype { font-size:0.65rem; letter-spacing:0.12em; color:var(--color-text-muted); text-transform:uppercase; background:rgba(255,255,255,0.06); padding:0.2rem var(--space-sm); border-radius:var(--radius-sm); }
      .card-mask { font-size:0.7rem; color:var(--color-text-faint); letter-spacing:0.08em; }
      .card-balance { font-family:var(--font-display); font-size:1.4rem; letter-spacing:-0.02em; line-height:1; display:flex; align-items:baseline; gap:2px; }
      .card-chevron { font-size:1.3rem; color:var(--color-text-faint); padding:0 var(--space-md) 0 var(--space-sm); transition:color var(--transition),transform var(--transition); }
      .card-inner:hover .card-chevron { color:var(--color-text-muted); transform:translateX(2px); }
      .money-symbol { font-family:var(--font-display); font-style:italic; font-size:0.9em; margin-right:1px; }
      .btn-add-account { margin-top:var(--space-lg); width:100%; padding:0.85rem; background:transparent; border:1px dashed var(--color-border-hover); border-radius:var(--radius-lg); color:var(--color-text); font-family:var(--font-mono); font-size:0.8rem; letter-spacing:0.1em; cursor:pointer; transition:border-color var(--transition),color var(--transition),background var(--transition); opacity:0; animation:fadeDown 0.5s 0.3s ease forwards; }
      .btn-add-account:hover { border-color:var(--color-accent); color:var(--color-accent); background:var(--color-accent-dim); }

      /* Modal */
      .modal-backdrop { position:fixed; inset:0; z-index:50; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; animation:fadeIn 0.2s ease both; }
      .modal { background:#000; border:1px solid var(--color-border-hover); border-radius:var(--radius-xl); padding:1.75rem; width:100%; max-width:440px; display:flex; flex-direction:column; gap:var(--space-lg); animation:slideUp 0.2s ease both; }
      .modal-header { display:flex; align-items:center; justify-content:space-between; }
      .modal-close { background:none; border:none; color:var(--color-text-muted); font-size:1rem; cursor:pointer; transition:color var(--transition); padding:var(--space-xs); line-height:1; }
      .modal-close:hover { color:var(--color-text); }
      .modal-fields { display:flex; flex-direction:column; gap:0.75rem; }
      .modal-row { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; }
      .modal-actions { display:flex; justify-content:flex-end; gap:0.75rem; }

      /* Account Detail */
      .detail-back { background:none; border:none; color:var(--color-text); font-family:var(--font-mono); font-size:0.75rem; letter-spacing:0.1em; cursor:pointer; margin-bottom:var(--space-lg); padding:0; transition:color var(--transition); text-align:left; }
      .detail-hero { display:flex; justify-content:space-between; align-items:flex-end; padding:var(--space-lg); border-left-width:3px; margin-bottom:var(--space-sm); }
      .detail-name { font-family:var(--font-display); font-size:1.5rem; font-weight:400; margin:0.25rem 0 0; }
      .detail-hero-right { text-align:right; }
      .detail-balance-label { font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--color-text-muted); margin-bottom:0.25rem; }
      .detail-balance { font-family:var(--font-display); font-size:2rem; letter-spacing:-0.02em; line-height:1; display:flex; align-items:baseline; gap:2px; }
      .tx-list { display:flex; flex-direction:column; }
      .tx-row { display:flex; justify-content:space-between; align-items:center; padding:0.85rem 0.75rem; border-bottom:1px solid var(--color-border); opacity:0; animation:slideUp 0.3s ease forwards; border-radius:var(--radius-sm); transition:background var(--transition); }
      .tx-row:hover { background:var(--color-surface); }
      .tx-merchant { font-size:0.85rem; color:var(--color-text); margin-bottom:0.2rem; }
      .tx-date { font-size:0.65rem; color:var(--color-text-muted); letter-spacing:0.06em; }
      .tx-amount { font-family:var(--font-display); font-size:1.1rem; letter-spacing:-0.01em; display:flex; align-items:baseline; gap:1px; }
      .esc-hint { position:fixed; bottom:1.5rem; right:1.5rem; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--color-text-faint); z-index:20; pointer-events:none; }
      .esc-section { border-bottom:1px solid var(--color-border); padding-bottom:1rem; margin-bottom:1rem; }
      .esc-section-toggle { width:100%; display:flex; align-items:center; justify-content:space-between; background:none; border:none; color:var(--color-text); font-family:var(--font-mono); font-size:0.85rem; letter-spacing:0.05em; cursor:pointer; padding:0.25rem 0; transition:color var(--transition); text-align:left; }
      .esc-section-toggle:hover { color:var(--color-accent); }
      .esc-chevron { font-size:0.7rem; color:var(--color-text-muted); }
      .esc-section-body { display:flex; flex-direction:column; gap:0.75rem; margin-top:1rem; }
    </style>
  </head>
  <body>
    <div id="initial-load">
